[platformio]
default_envs = esp32s3

[base]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; board_build.f_flash = 80000000L
board_build.psram_size = 8MB
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
; board_build.filesystem = littlefs

upload_speed = 921600
monitor_speed = 115200

; Reserved Pins (Do Not Use):
;  - SPI Flash/PSRAM: GPIO26, GPIO27, GPIO28, GPIO29, GPIO30, GPIO31, GPIO32, GPIO33, GPIO34, GPIO35, GPIO36, GPIO37.
;  - Note: If your module uses Octal SPI (like the ESP32-S3-WROOM-1), GPIO35, GPIO36, and GPIO37 are always used for memory.
;  - Strapping Pins (Use with Caution):
;      GPIO0: Boot mode (connected to Boot button).
;      GPIO3: Strapping pin.
;      GPIO45: Strapping pin (VDD_SPI voltage selection).
;      GPIO46: Strapping pin.
;  - ADC2 Limitations: ADC2 (GPIO11-20) cannot be used while Wi-Fi is active.
;
  ; I.e. do not use GPIO 0, 3, 26-37, 45 and 46. Also do not use ADC on GPIO 11-20.

build_flags =
    -DDISPLAY_REFRESH_MS=50  ; Refresh display every 20ms (50 FPS)
    ;
    ; TFT_eSPI configuration shared by both display variants
    -DDISABLE_ALL_LIBRARY_WARNINGS=1
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1   ; reused for the GC9D01 dual-eye variant too
    -DSPI_FREQUENCY=40000000
    -DLOAD_GLCD=1   ; Original Adafruit 8 pixel font
    -DLOAD_FONT2=1 ; Small 16 pixel high font
    -DLOAD_FONT4=1 ; Medium 26 pixel high font
    ; -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ;
    ; === ESP32 pins connections ===
    ;
    ; TFT shared SPI pins (no MISO, no backlight)
    -DTFT_MISO=-1
    -DTFT_DC=11
    -DTFT_MOSI=10
    -DTFT_SCLK=9
    -DPIN_TFT_BL=-1
    ;
    ; ----- Servo outputs -----
    -DPIN_SERVO_1=6
    -DPIN_SERVO_2=7
    -DPIN_SERVO_3=15
    -DPIN_SERVO_4=16
    -DPIN_SERVO_5=17
    -DPIN_SERVO_6=18
    -DPIN_SERVO_7=8
    -DPIN_SERVO_8=42
    ;
    ; === Other settings ===
    ;
    ; PSRAM
    -DBOARD_HAS_PSRAM=1
    ;
    ; Serial on the default USB:
    -D ARDUINO_USB_MODE=1
    ; -D ARDUINO_USB_CDC_ON_BOOT=1
    ;

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    tzapu/WiFiManager @ ^2.0.17
    ESP32Async/AsyncTCP @ ^3.3.2
    ESP32Async/ESPAsyncWebServer @ ^3.6.0
    bblanchon/ArduinoJson @ ^7.2.1


; Single GC9A01 240x240 round display with on-board mouth+eyes face.
[env:esp32s3]
extends = base
build_src_filter = +<*> -<robot_eyes.cpp>
build_flags =
    ${base.build_flags}
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_ROTATION=0   ; 1 = horizontal, connector on the right, 0 = vertical, connector at the bottom
    -DTFT_CS=12
    -DTFT_RST=13


; Dual GC9D01 160x160 round displays — one per eye. The GC9D01 accepts the
; GC9A01 init sequence in practice; if a particular panel needs tweaks we'll
; fork the driver header. CS and RST are driven manually by RobotEyes (lib
; sees -1 and stays out of the way).
[env:esp32s3_eyes]
extends = base
build_src_filter = +<*> -<robot_face.cpp>
build_flags =
    ${base.build_flags}
    -DTFT_WIDTH=160
    -DTFT_HEIGHT=160
    -DTFT_ROTATION=0
    -DTFT_CS=-1
    -DTFT_RST=-1
    -DPIN_TFT_CS1=12
    -DPIN_TFT_RST1=13
    -DPIN_TFT_CS2=20
    -DPIN_TFT_RST2=21
    -DROBOT_FACE_VARIANT_EYES=1
