[platformio]
default_envs = esp32s3_pca9685

[base]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; board_build.f_flash = 80000000L
board_build.psram_size = 8MB
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
; board_build.filesystem = littlefs

upload_speed = 921600
monitor_speed = 115200

; Filter LDF candidates to libs that declare ESP32 compatibility — without
; this, ESPAsyncWebServer's transitive resolution drags in RPAsyncTCP
; (RP2040-only) and the build fails on lwIP API differences.
lib_compat_mode = strict

; Reserved Pins (Do Not Use):
;  - SPI Flash/PSRAM: GPIO26, GPIO27, GPIO28, GPIO29, GPIO30, GPIO31, GPIO32, GPIO33, GPIO34, GPIO35, GPIO36, GPIO37.
;  - Note: If your module uses Octal SPI (like the ESP32-S3-WROOM-1), GPIO35, GPIO36, and GPIO37 are always used for memory.
;  - Strapping Pins (Use with Caution):
;      GPIO0: Boot mode (connected to Boot button).
;      GPIO3: Strapping pin.
;      GPIO45: Strapping pin (VDD_SPI voltage selection).
;      GPIO46: Strapping pin.
;  - ADC2 Limitations: ADC2 (GPIO11-20) cannot be used while Wi-Fi is active.
;
  ; I.e. do not use GPIO 0, 3, 26-37, 45 and 46. Also do not use ADC on GPIO 11-20.

build_flags =
    -DDISPLAY_REFRESH_MS=50  ; Refresh display every 20ms (50 FPS)
    ;
    ; TFT_eSPI configuration shared by both display variants. The
    ; specific *_DRIVER define lives in each env (GC9A01 single-display
    ; vs GC9D01 dual-eye — different init sequences).
    -DDISABLE_ALL_LIBRARY_WARNINGS=1
    -DUSER_SETUP_LOADED=1
    -DSPI_FREQUENCY=20000000  ; Mouth (GC9A01 on HSPI) only — eyes use raw SPI via GC9D01_LTSM. 40 MHz caused bit errors over the long HSPI dupont wires; since the mouth only redraws on expression change, corruption accumulated in the panel's GRAM.
    -DLOAD_GLCD=1   ; Original Adafruit 8 pixel font
    -DLOAD_FONT2=1 ; Small 16 pixel high font
    -DLOAD_FONT4=1 ; Medium 26 pixel high font
    ; -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ;
    ; === ESP32 pins connections ===
    ;
    ; TFT shared SPI pins (no MISO, no backlight)
    -DTFT_MISO=-1
    -DPIN_TFT_BL=-1
    ;
    ; ----- Servo outputs -----
    -DPIN_SERVO_1=6
    -DPIN_SERVO_2=7
    -DPIN_SERVO_3=15
    -DPIN_SERVO_4=16
    -DPIN_SERVO_5=17
    -DPIN_SERVO_6=18
    -DPIN_SERVO_7=8
    -DPIN_SERVO_8=42
    ;
    ; === Other settings ===
    ;
    ; PSRAM
    -DBOARD_HAS_PSRAM=1
    ;
    ; Serial on the default USB:
    -D ARDUINO_USB_MODE=1
    ; -D ARDUINO_USB_CDC_ON_BOOT=1
    ;

lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    ESP32Async/AsyncTCP @ ^3.3.2
    ESP32Async/ESPAsyncWebServer @ ^3.6.0
    bblanchon/ArduinoJson @ ^7.2.1
    ; TFT_eSPI: face variant uses it as the GC9A01 panel driver; eyes
    ; variant uses only TFT_eSprite for offscreen rendering and never
    ; init()'s the panel — GC9D01_LTSM owns that. Same lib serves both.
    bodmer/TFT_eSPI @ ^2.5.43
    ; Eyes variant only — pulls in display16_LTSM transitively via
    ; library.properties depends=. Harmless for the face env (no source
    ; references it). Lives here rather than per-env lib_deps because
    ; PlatformIO env-level lib_deps replace the base list rather than
    ; appending.
    gavinlyonsrepo/GC9D01_LTSM @ ^1.1.0


; Production build: one GC9A01 240x240 panel for the mouth (driven by
; TFT_eSPI) plus two GC9D01 160x160 panels for the eyes (driven by
; gavinlyonsrepo/GC9D01_LTSM through the default Arduino `SPI` object,
; with smooth shapes rendered into a TFT_eSprite first).
;
; Two SPI buses to avoid contention:
;   - HSPI (SPI3): TFT_eSPI → mouth panel. Selected via USE_HSPI_PORT.
;   - FSPI (SPI2): default `SPI` → eye panels (DC/MOSI/SCLK on
;     PIN_EYES_*, per-panel CS/RST on PIN_TFT_CS1..RST2).
;
; TFT_eSPI is still configured with GC9A01_DRIVER for the mouth; the
; eyes use it only for the offscreen TFT_eSprite (never init()ed as a
; panel), and the per-eye init/push goes through GC9D01_LTSM +
; SPI.writeBytes.
[env:esp32s3]
extends = base
; Exclude the PCA9685 backend source from the LEDC build. (servo_pca9685.cpp
; is also guarded by #if SERVO_BACKEND_PCA9685 so it would compile to nothing,
; but skipping it at the filter level avoids pulling in Adafruit_PWMServoDriver
; transitively.)
build_src_filter = +<*> -<debug/> -<servo_pca9685.cpp>
build_flags =
    ${base.build_flags}
    -DSERVO_BACKEND_LEDC=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_ROTATION=0   ; 1 = horizontal, connector on the right, 0 = vertical, connector at the bottom
    -DUSE_HSPI_PORT=1  ; move TFT_eSPI off the default FSPI so the eyes' SPI bus is unshared
    ; --- Mouth (GC9A01) on HSPI ---
    -DTFT_DC=38
    -DTFT_MOSI=39
    -DTFT_SCLK=40
    -DTFT_CS=2
    -DTFT_RST=1
    ; --- Eyes (dual GC9D01) on the default FSPI ---
    -DPIN_EYES_DC=11
    -DPIN_EYES_MOSI=10
    -DPIN_EYES_SCLK=9
    -DPIN_TFT_CS1=12
    -DPIN_TFT_RST1=13
    -DPIN_TFT_CS2=14
    -DPIN_TFT_RST2=21


; Production build with the PCA9685 servo backend instead of direct LEDC.
; Frees the per-servo GPIOs (PIN_SERVO_1..8 are ignored) and lifts the 8-servo
; cap to 16. Same displays as [env:esp32s3]. Wire one PCA9685 board over I2C
; on PIN_I2C_SDA / PIN_I2C_SCL with V+ from a dedicated servo rail.
;   pio run -e esp32s3_pca9685 -t upload -t monitor
[env:esp32s3_pca9685]
extends = env:esp32s3
; Drop the LEDC source, pick up the PCA9685 source.
build_src_filter = +<*> -<debug/> -<servo_ledc.cpp>
build_flags =
    ${env:esp32s3.build_flags}
    -USERVO_BACKEND_LEDC
    -DSERVO_BACKEND_PCA9685=1
    ; --- PCA9685 wiring ---
    -DPIN_I2C_SDA=4
    -DPIN_I2C_SCL=5
    -DPCA9685_ADDR=0x40
    ; --- INA219 current sensor (same I²C bus) ---
    ; Default INA219 breakout address is 0x40, which clashes with the PCA9685
    ; above — solder the A1 jumper to move it to 0x44.
    -DINA219_ADDR=0x44
lib_deps =
    ${base.lib_deps}
    adafruit/Adafruit PWM Servo Driver Library @ ^3.0.0
    adafruit/Adafruit INA219 @ ^1.2.3


; Standalone debug sketch for the dual GC9D01 wiring. Excludes main.cpp and
; all robot source — only compiles src/debug/eyes_debug.cpp, which has its
; own setup()/loop() and walks through display tests via serial keys.
;   pio run -e esp32s3_eyes_debug -t upload -t monitor
[env:esp32s3_eyes_debug]
extends = base
build_src_filter = -<*> +<debug/eyes_debug.cpp>
build_flags =
    ${base.build_flags}
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=160
    -DTFT_HEIGHT=160
    -DTFT_ROTATION=0
    ; TFT_eSPI is pulled in for TFT_eSprite only — never init()ed as a
    ; panel. The pin defines still need to compile, but their values
    ; don't matter; -1 is fine.
    -DTFT_CS=-1
    -DTFT_RST=-1
    -DTFT_DC=-1
    -DTFT_MOSI=-1
    -DTFT_SCLK=-1
    ; --- Eyes (dual GC9D01) on the default FSPI ---
    -DPIN_EYES_DC=11
    -DPIN_EYES_MOSI=10
    -DPIN_EYES_SCLK=9
    -DPIN_TFT_CS1=12
    -DPIN_TFT_RST1=13
    -DPIN_TFT_CS2=14
    -DPIN_TFT_RST2=21
